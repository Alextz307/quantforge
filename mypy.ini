[mypy]
python_version = 3.12
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_untyped_decorators = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
show_error_codes = true
enable_error_code =
    ignore-without-code,
    redundant-cast,
    truthy-bool,
    truthy-iterable,
# src/quant_engine is the editable-installed `quant_engine` package. When mypy
# walks `src/`, it discovers the same stubs twice (as `src.quant_engine.*` and
# as `quant_engine.*`), triggering a duplicate-module error. Exclude it from
# the walk; `from quant_engine import ...` in tests resolves via the installed
# path and still type-checks against the .pyi stubs.
exclude = ^src/quant_engine/

# yfinance, statsmodels, sklearn, pmdarima, and scipy ship without py.typed
# markers in the versions we depend on; mypy can't find inline stubs and
# there are no usable types-* packages on PyPI. Keep ignores until upstream
# ships markers.
[mypy-yfinance.*]
ignore_missing_imports = true

[mypy-statsmodels.*]
ignore_missing_imports = true

[mypy-sklearn.*]
ignore_missing_imports = true

[mypy-pmdarima.*]
ignore_missing_imports = true

[mypy-scipy.*]
ignore_missing_imports = true

# torch ships py.typed but the inline stubs trigger thousands of strict-mode
# errors from internal Any usage; keep ignore until torch typing matures.
[mypy-torch.*]
ignore_missing_imports = true

# The lint-and-typecheck job's pip install is intentionally slim and lacks
# fastapi/bcrypt/itsdangerous/slowapi. When a script lazy-imports webapp.* (e.g.
# dump_openapi calling create_app for the OpenAPI dump), mypy would otherwise
# choke on those missing modules. The dedicated `webapp` CI job runs
# `mypy --strict webapp/backend` with the full env — webapp/backend on the CLI
# bypasses follow_imports overrides, so strict checking of webapp/ still happens
# there.
[mypy-webapp.*]
follow_imports = skip
ignore_missing_imports = true
