name: Benchmark

# Disabled until the benchmark.py runner is implemented.
# Re-enable by changing to: on: push: branches: [main]
on: workflow_dispatch

jobs:
  benchmark:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build C++
        run: |
          cmake -B cpp/build -S cpp -DCMAKE_BUILD_TYPE=Release
          cmake --build cpp/build -j$(sysctl -n hw.ncpu)

      - name: Run C++ benchmarks
        run: cd cpp/build && ./quant_bench --benchmark_format=console
