name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff mypy pandas-stubs pydantic pydantic-settings numpy torch types-PyYAML types-psutil types-tqdm pytest pyarrow psutil tqdm
      - run: python scripts/check_ci_deps.py
      - run: ruff check src/ tests/ scripts/
      - run: ruff format --check src/ tests/ scripts/
      # Build + install the `quant_engine` C++ extension so mypy can resolve
      # `from quant_engine import ...` against the bundled .pyi stubs.
      # scikit-build-core fetches its own build deps in an isolated env.
      - run: pip install -e .
      - run: mypy --strict src/ tests/ scripts/
      - run: python scripts/check_readme_test_counts.py

  cpp-build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Configure C++
        run: cmake -B cpp/build -S cpp -DCMAKE_BUILD_TYPE=Debug

      - name: Build C++
        run: cmake --build cpp/build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Run C++ tests
        run: cd cpp/build && ctest --output-on-failure

  python-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install libomp (macOS, required by xgboost)
        if: runner.os == 'macOS'
        run: brew install libomp
      - name: Install Python dependencies
        run: pip install pytest pytest-cov pandas numpy pydantic pydantic-settings pyyaml torch xgboost arch statsmodels scikit-learn optuna scipy pmdarima matplotlib yfinance click psutil tqdm pyarrow
      # Build + install the `quant_engine` C++ extension so integration tests
      # can `import quant_engine`. scikit-build-core fetches its own build
      # deps in an isolated env.
      - name: Install quant_engine extension
        run: pip install -e .
      - name: Run Python tests
        env:
          OMP_NUM_THREADS: "1"
        run: python -m pytest tests/ -v --tb=short

  webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install webapp + dev dependencies
        run: pip install fastapi 'uvicorn[standard]' pydantic pydantic-settings httpx bcrypt itsdangerous slowapi click pytest pytest-cov mypy ruff
      - name: Lint webapp
        run: |
          ruff check webapp/backend
          ruff format --check webapp/backend
      - name: Typecheck webapp
        run: mypy --strict webapp/backend
      - name: Test webapp
        run: pytest webapp/backend/tests/ -v --tb=short --cov=webapp/backend/app --cov-report=term-missing --cov-fail-under=80

  webapp-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json
      - name: Install backend dependencies for OpenAPI snapshot
        run: pip install fastapi 'uvicorn[standard]' pydantic pydantic-settings httpx bcrypt itsdangerous slowapi click
      - name: Check OpenAPI snapshot is current
        run: python -m scripts.check_openapi_snapshot
      - name: Check Pydantic ↔ zod schema mirror is current
        run: python -m scripts.check_webapp_schema_mirror
      - name: Install frontend dependencies
        working-directory: webapp/frontend
        run: npm ci
      - name: Generate OpenAPI types
        working-directory: webapp/frontend
        run: npm run gen:api
      - name: Lint frontend
        working-directory: webapp/frontend
        run: |
          npm run lint
          npm run format:check
      - name: Typecheck frontend
        working-directory: webapp/frontend
        run: npm run typecheck
      - name: Test frontend
        working-directory: webapp/frontend
        run: npm run test:cov
      - name: Build frontend
        working-directory: webapp/frontend
        run: npm run build
