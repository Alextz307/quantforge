name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy pandas-stubs pydantic pydantic-settings numpy torch types-PyYAML pytest pyarrow
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: mypy --strict src/ tests/

  cpp-build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure C++
        run: cmake -B cpp/build -S cpp -DCMAKE_BUILD_TYPE=Debug

      - name: Build C++
        run: cmake --build cpp/build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Run C++ tests
        run: cd cpp/build && ctest --output-on-failure

  python-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install pytest pytest-cov pandas numpy pydantic pydantic-settings pyyaml torch xgboost arch statsmodels scikit-learn optuna matplotlib yfinance click pyarrow
      - name: Run Python tests
        run: python -m pytest tests/ -v --tb=short
