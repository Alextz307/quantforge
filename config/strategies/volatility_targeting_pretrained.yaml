# Example ExperimentConfig — inject a pretrained HybridVolatilityModel into
# VolatilityTargetingStrategy. Run after producing the artifact via:
#   python -m scripts.experiment train-model \
#       --config config/models/spy_hybrid_volatility.yaml
#
# then:
#   python -m scripts.experiment run \
#       --config config/strategies/volatility_targeting_pretrained.yaml

name: spy_voltgt_pretrained
seed: 42

data:
  source: yfinance
  tickers: [SPY]
  start: 2020-01-02
  end: 2024-12-31
  interval: daily

# VolatilityTargeting needs OHLC for the Garman-Klass realized-vol target,
# so keep_ohlc:true augments the standard pipeline rather than replacing it.
features:
  name: standard
  params:
    keep_ohlc: true

strategy:
  name: VolatilityTargeting
  params:
    # Strategy-level kwargs (user-tunable even with a frozen leaf):
    target_vol: 0.15
    trend_window: 100
    max_leverage: 1.5
    bearish_exposure: 0.0
    realized_vol_window: 20
    # Leaf-required kwargs the strategy reads for its own metadata —
    # must match the frozen leaf's trained values. Mismatch is rejected
    # at injection time by validate_pretrained_leaf.
    feature_columns:
      - return_1d
      - return_5d
      - return_21d
      - vol_20
      - ma_ratio
      - rsi_14
      - macd
      - macd_signal
      - macd_hist
    lstm_lookback: 30
    # Leaf-owned kwargs (garch_*, lstm_hidden_dim, etc.) MUST NOT appear
    # here — the artifact pins them. Setting them would be rejected by
    # the config cross-validator ``_validate_pretrained_leaves_config``.

# Maps leaf_key -> artifact directory. Builder loads each and injects via
# the strategy ctor's ``pretrained_leaves`` kwarg. The study orchestrator
# rewrites this path per universe at run time.
pretrained_leaves:
  vol_model: experiment_results/models/spy_hybrid_volatility_2024q4

validation:
  n_splits: 3
  test_size: 252
  gap: 5
  expanding: true
  # Reserve a holdout region for the final OOS evaluation.
  holdout_pct: 0.15

slippage:
  scenario: normal
