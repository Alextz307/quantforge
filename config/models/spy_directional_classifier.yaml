# Example StandaloneModelConfig — train a DirectionalClassifier on SPY daily.
#
# Usage:
#   python -m scripts.experiment train-model --config config/models/spy_directional_classifier.yaml
#
# Produces experiment_results/models/spy_xgb_directional_2024q4/ with
# {manifest.json, config.yaml, weights/} for later injection into a
# MomentumGatekeeperStrategy via ExperimentConfig.pretrained_leaves.

name: spy_xgb_directional_2024q4
seed: 42

data:
  source: yfinance
  tickers: [SPY]
  start: 2015-01-02
  end: 2024-12-31
  interval: daily

model:
  name: xgboost_directional
  params:
    # Feature columns the classifier trains on. Must match the columns
    # produced by MomentumGatekeeperStrategy's FeatureEngineeringPipeline
    # at the same ctor defaults (rsi_period=14, macd_fast/slow/signal=12/26/9).
    feature_columns: [rsi_14, macd, macd_signal]
    # Compact defaults — bump for a real training run.
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 4
    subsample: 0.8
    colsample_bytree: 0.8

model_kind: classifier
