# Example StandaloneModelConfig — train a HybridVolatilityModel on SPY daily.
#
# Usage:
#   python -m scripts.experiment train-model --config config/models/spy_hybrid_volatility.yaml
#
# Produces experiment_results/models/spy_hybrid_volatility_2024q4/ with
# {manifest.json, config.yaml, weights/} for later injection into a
# VolatilityTargetingStrategy via ExperimentConfig.pretrained_leaves.
#
# Also serves as the per-universe template the study orchestrator
# (`experiment study train-leaves`) consumes — for each universe it
# overrides the data block + name and writes the artifact to
# experiment_results/models/{universe}_vol_model/.

name: spy_hybrid_volatility_2024q4
seed: 42

data:
  source: yfinance
  tickers: [SPY]
  start: 2015-01-02
  end: 2024-12-31
  interval: daily

# HybridVolatilityModel computes its target from OHLC (Garman-Klass), so
# keep_ohlc:true preserves the raw bars alongside the engineered features.
features:
  name: standard
  params:
    keep_ohlc: true

model:
  name: hybrid_volatility
  params:
    # Feature set the strategy will pass to the leaf at inference time —
    # must match the strategy config exactly (validated via
    # validate_pretrained_leaf at injection).
    feature_columns:
      - return_1d
      - return_5d
      - return_21d
      - vol_20
      - ma_ratio
      - rsi_14
      - macd
      - macd_signal
      - macd_hist
    # Compact defaults — bump for a real training run.
    garch_p_max: 3
    garch_q_max: 3
    lstm_hidden_dim: 64
    lstm_num_layers: 2
    lstm_lookback: 30
    lstm_epochs: 50
    lstm_batch_size: 32

# model_kind defaults to "predictor"; classifiers set "classifier" here.
model_kind: predictor
