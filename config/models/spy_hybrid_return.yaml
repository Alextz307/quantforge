# Example StandaloneModelConfig — train a HybridReturnModel on SPY daily.
#
# Usage:
#   python -m scripts.experiment train-model --config config/models/spy_hybrid_return.yaml
#
# Produces experiment_results/models/spy_hybrid_return_2024q4/ with
# {manifest.json, config.yaml, weights/} for later injection into a
# ReturnForecastStrategy via ExperimentConfig.pretrained_leaves.

name: spy_hybrid_return_2024q4
seed: 42

data:
  source: yfinance
  tickers: [SPY]
  start: 2015-01-02
  end: 2024-12-31
  interval: daily

model:
  name: hybrid_return
  params:
    # The feature set the strategy will pass to the leaf at inference
    # time — must match the strategy config exactly (validated via
    # validate_pretrained_leaf at injection).
    feature_columns: [sma_20, rsi_14, volume_z]
    # Compact defaults — bump for a real training run.
    arma_p_max: 3
    arma_q_max: 3
    lstm_hidden_dim: 64
    lstm_num_layers: 2
    lstm_lookback: 30
    lstm_epochs: 50
    lstm_batch_size: 32

# model_kind defaults to "predictor"; classifiers set "classifier" here.
model_kind: predictor
