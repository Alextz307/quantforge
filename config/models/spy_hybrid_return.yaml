# Example StandaloneModelConfig — train a HybridReturnModel on SPY daily.
#
# Usage:
#   python -m scripts.experiment train-model --config config/models/spy_hybrid_return.yaml
#
# Produces experiment_results/models/spy_hybrid_return_2024q4/ with
# {manifest.json, config.yaml, weights/} for later injection into a
# ReturnForecastStrategy via ExperimentConfig.pretrained_leaves.

name: spy_hybrid_return_2024q4
seed: 42

data:
  source: yfinance
  tickers: [SPY]
  start: 2015-01-02
  end: 2024-12-31
  interval: daily

# HybridReturnModel reads close from the post-pipeline frame to compute
# its ARMA log-return target, so keep_ohlc:true preserves the raw bars
# alongside the engineered features.
features:
  name: standard
  params:
    keep_ohlc: true

model:
  name: hybrid_return
  params:
    # Feature set the strategy will pass to the leaf at inference time —
    # must match the strategy config exactly (validated via
    # validate_pretrained_leaf at injection). Drawn from the standard
    # pipeline's nine outputs.
    feature_columns:
      - return_1d
      - return_5d
      - return_21d
      - vol_20
      - ma_ratio
      - rsi_14
      - macd
      - macd_signal
      - macd_hist
    # Compact defaults — bump for a real training run.
    arma_p_max: 3
    arma_q_max: 3
    lstm_hidden_dim: 64
    lstm_num_layers: 2
    lstm_lookback: 30
    lstm_epochs: 50
    lstm_batch_size: 32

# model_kind defaults to "predictor"; classifiers set "classifier" here.
model_kind: predictor
