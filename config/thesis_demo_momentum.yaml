# Thesis-demo Momentum config — parquet-backed sibling of
# ``config/thesis_demo.yaml``, used by the ``make thesis-demo`` compare
# step so the demo runs offline. Same purpose-disclaimer as the other
# demo config: this is a pipeline smoke, not an empirical claim.
#
# The general-purpose, network-backed standalone config is
# ``config/strategies/momentum_gatekeeper.yaml`` — keep that one for HPO
# / real experiments and this one for the offline demo only.

name: thesis_demo_momentum
seed: 42

data:
  source:
    name: parquet
    params:
      data_dir: tests/fixtures
  tickers: [SPY]
  start: 2018-01-02
  end: 2024-12-31
  interval: daily

strategy:
  name: MomentumGatekeeper
  params:
    ma_window: 50
    prob_threshold: 0.55
    rsi_period: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    vol_window: 20
    ma_ratio_window: 20
    short_return_period: 5
    long_return_period: 21
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 5
    subsample: 0.8
    colsample_bytree: 0.8
    val_split_ratio: 0.2

validation:
  n_splits: 4
  test_size: 252
  gap: 5
  expanding: true
  holdout_pct: 0.15

slippage:
  scenario: normal
