# Thesis demo entry-point — the simplest end-to-end run that exercises
# the full pipeline (data load → walk-forward → engine → metrics →
# strategy reporter). Purpose: prove the wires connect on a fresh
# checkout with no network access, NOT to make an empirical claim. The
# comprehensive empirical study will land separately under
# ``experiment_results/studies/``.
#
# Multi-strategy comparison + per-regime split is composed by the
# Makefile ``thesis-demo`` target via repeated ``--config`` flags
# (sibling ``thesis_demo_momentum.yaml``). There is no top-level
# "list of YAMLs" schema today — multi-experiment orchestration is
# out of scope for the demo runner.

name: thesis_demo
seed: 42

data:
  source:
    name: parquet
    params:
      data_dir: tests/fixtures
  tickers: [SPY]
  start: 2018-01-02
  end: 2024-12-31
  interval: daily

strategy:
  name: AdaptiveBollinger
  params:
    window: 20
    k: 2.0
    trend_window: 100
    garch_p_max: 3
    garch_q_max: 3

validation:
  n_splits: 4
  test_size: 252
  gap: 5
  expanding: true
  holdout_pct: 0.15

slippage:
  scenario: normal
