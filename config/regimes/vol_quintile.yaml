# Volatility-quintile regime split.
#
# Bars get a quintile label (Q1 = lowest realised vol, Q5 = highest)
# based on the 20-bar rolling std of close-to-close log-returns.
# Quantile cut-points are fit POST-HOC on the entire fetched range —
# this is regime *interpretation* of a finished walk-forward run, not
# in-flight signal generation, and the in-flight strategy training
# already respects walk-forward boundaries.
detector:
  name: volatility
  params:
    window: 20
    n_quantiles: 5
