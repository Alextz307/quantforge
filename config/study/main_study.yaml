name: main_study
description: >
  Empirical study — five strategies evaluated across twelve universes
  (index ETFs, single large-caps, commodity, GFC stress window). Each leg
  is composed by deep-merging a universe profile (config/universes/<name>.yaml)
  onto the strategy YAML, then running HPO + cross-strategy comparison + regime
  split + holdout-eval. ML-bearing strategies use the non-pretrained variant
  (leaf refits per fold) so walk-forward folds remain self-contained.
seed: 42
output_dir: studies/main

legs:
  - strategy: AdaptiveBollinger
    strategy_config: config/strategies/adaptive_bollinger.yaml
    hpo_config: config/hpo/adaptive_bollinger.yaml
    universes:
      - spy_daily_5y
      - spy_daily_10y
      - spy_daily_covid
      - qqq_daily_5y
      - iwm_daily_5y
      - dia_daily_5y
      - aapl_daily_5y
      - msft_daily_5y
      - jpm_daily_5y
      - gld_daily_5y
      - spy_daily_2008

  - strategy: PairsTrading
    strategy_config: config/strategies/pairs_trading.yaml
    hpo_config: config/hpo/pairs_trading.yaml
    universes:
      - ivv_voo_daily_5y

  - strategy: MomentumGatekeeper
    strategy_config: config/strategies/momentum_gatekeeper.yaml
    hpo_config: config/hpo/momentum_gatekeeper.yaml
    universes:
      - spy_daily_5y
      - spy_daily_10y
      - qqq_daily_5y
      - iwm_daily_5y
      - dia_daily_5y
      - aapl_daily_5y
      - msft_daily_5y
      - jpm_daily_5y
      - gld_daily_5y

  - strategy: VolatilityTargeting
    strategy_config: config/strategies/volatility_targeting.yaml
    hpo_config: config/hpo/volatility_targeting.yaml
    universes:
      - spy_daily_5y
      - spy_daily_10y
      - qqq_daily_5y
      - iwm_daily_5y
      - dia_daily_5y
      - aapl_daily_5y
      - msft_daily_5y
      - jpm_daily_5y
      - gld_daily_5y

  - strategy: ReturnForecast
    strategy_config: config/strategies/return_forecast.yaml
    hpo_config: config/hpo/return_forecast.yaml
    universes:
      - spy_daily_5y
      - spy_daily_10y
      - qqq_daily_5y
      - iwm_daily_5y
      - dia_daily_5y
      - aapl_daily_5y
      - msft_daily_5y
      - jpm_daily_5y
      - gld_daily_5y
