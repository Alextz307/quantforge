name: main_study
description: >
  Empirical study - six strategies swept across liquid, well-known assets
  (an index ETF, gold, nine mega-cap single-names) plus two cross-asset
  baskets, each at 5-year (2021-2025) and 10-year (2016-2025) lookbacks.
  Longer histories take a smaller holdout (5y -> 0.20, 10y -> 0.15). Each
  leg deep-merges a universe profile (config/universes/<name>.yaml) onto
  the strategy YAML, then runs HPO + cross-strategy comparison +
  holdout-eval. CrossAssetMomentum sweeps multi-ticker baskets via
  per-universe strategy_params overrides. ML-bearing strategies refit
  their leaves per fold so walk-forward folds stay self-contained.
seed: 42
output_dir: studies/main

legs:
  - strategy: AdaptiveBollinger
    strategy_config: config/strategies/adaptive_bollinger.yaml
    hpo_config: config/hpo/adaptive_bollinger.yaml
    universes:
      - spy_daily_5y
      - spy_daily_10y
      - qqq_daily_5y
      - qqq_daily_10y
      - gld_daily_5y
      - gld_daily_10y
      - aapl_daily_5y
      - aapl_daily_10y
      - msft_daily_5y
      - msft_daily_10y
      - googl_daily_5y
      - googl_daily_10y
